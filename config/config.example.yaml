# Example configuration for nb-email-templating
# Use environment variables for secrets: ${VAR} or ${VAR:-default}

server:
  host: "0.0.0.0"
  port: 8025
  # Optional: URL Beezkeeper should call (shown on Overview). If unset, derived from how you open the dashboard.
  # public_base_url: "https://email-service.example.com:8025"
  shutdown_timeout_seconds: 30
  max_request_size: 1048576  # 1 MB

auth:
  webhook_token: "${NB_EMAIL_WEBHOOK_TOKEN:-change-me}"
  session_cookie_name: "nb_email_session"
  session_max_age_seconds: 86400  # 24 hours

smtp:
  host: "smtp.example.com"
  port: 587
  starttls: true
  username: "${SMTP_USERNAME:-}"
  password: "${SMTP_PASSWORD:-}"
  from_address: "NetBeez Alerts <alerts@netbeez.local>"
  max_connections: 5

dedup:
  window_seconds: 3600

data_retention:
  days: 90
  cleanup_hour: 3  # 0-23

retry:
  max_attempts: 3
  backoff_base_seconds: 2
  backoff_max_seconds: 60
  recovery_timeout_seconds: 300

rendering:
  template_render_timeout_seconds: 5

test_tools:
  rate_limit_per_minute: 5

# Optional: merged into every email Jinja context (footer links, SOP, friendly NetBeez hostname).
template_context:
  staff_sop_url: "" # e.g. "https://intranet.example/runbooks/netbeez-alerts"
  netbeez_dashboard_url: "" # e.g. "https://nbz.example.com" (shown in footer; also rewrites incident links when set)

templates:
  ALERT_OPEN:
    file: alert_open.html.j2
    active: true
    subject: "{% if attributes.target %}[NB] - Target Alert - Target: {{ attributes.target }} - Source: {{ attributes.agent }} - Message: {{ attributes.message }}{% elif is_aggregate %}[NB] - Agent Aggregate Alert - Count: {{ aggregate_count }} - Source: {{ attributes.agent }} - Message: {{ attributes.message }}{% else %}[NB] - Agent Alert - Source: {{ attributes.agent }} - Message: {{ attributes.message }}{% endif %}"
    recipients:
      to: ["ops@example.com"]
      cc: []
      bcc: []
  ALERT_CLEARED:
    file: alert_cleared.html.j2
    active: true
    subject: "{% if attributes.target %}[NB] - Target Alert - Target: {{ attributes.target }} - Source: {{ attributes.agent }} - Message: {{ attributes.message }}{% elif is_aggregate %}[NB] - Agent Aggregate Alert Cleared - Count: {{ aggregate_count }} - Source: {{ attributes.agent }} - Message: {{ attributes.message }}{% else %}[NB] - Agent Alert - Source: {{ attributes.agent }} - Message: {{ attributes.message }}{% endif %}"
    recipients:
      to: ["ops@example.com"]
      cc: []
      bcc: []
  INCIDENT_OPEN:
    file: incident_open.html.j2
    active: true
    subject: "[NB] - Agent Incident Detected{% set tt = (attributes.test_type | default('', true) | lower) %}{% if tt %} for {% if tt == 'http' %}HTTP{% elif tt == 'ping' %}Ping{% elif tt == 'dns' %}DNS{% else %}{{ tt | title }}{% endif %} tests{% endif %} on {{ attributes.agent }}"
    recipients:
      to: ["ops@example.com"]
      cc: []
      bcc: []
  INCIDENT_CLEARED:
    file: incident_cleared.html.j2
    active: true
    subject: "[NB] - Agent Incident Closed{% set tt = (attributes.test_type | default('', true) | lower) %}{% if tt %} for {% if tt == 'http' %}HTTP{% elif tt == 'ping' %}Ping{% elif tt == 'dns' %}DNS{% else %}{{ tt | title }}{% endif %} tests{% endif %} on {{ attributes.agent }}"
    recipients:
      to: ["ops@example.com"]
      cc: []
      bcc: []
  _fallback:
    file: _fallback.html.j2
    active: true
    subject: "[NB] - Event: {{ event_type }}"
    recipients:
      to: ["ops@example.com"]
      cc: []
      bcc: []

logging:
  path: "/app/logs"
  max_bytes: 10485760  # 10 MB
  backup_count: 5
  level: "INFO"
  format: "json"
